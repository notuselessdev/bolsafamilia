name: Sync Bolsa Família Data

on:
  schedule:
    # Run daily at 3am UTC (midnight BRT) — higher API rate limits at night
    - cron: '0 3 * * *'
  workflow_dispatch: # Allow manual trigger from GitHub UI

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: Seed municipalities (if needed)
        run: |
          if [ ! -f data/bolsafamilia.db ]; then
            npm run db:seed
          fi

      - name: Sync data from APIs
        env:
          TRANSPARENCIA_API_KEY: ${{ secrets.TRANSPARENCIA_API_KEY }}
        run: npm run db:sync

      - name: Check if DB changed
        id: check
        run: |
          git add data/bolsafamilia.db
          if git diff --cached --quiet; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push updated DB
        if: steps.check.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/bolsafamilia.db
          git commit -m "chore: sync Bolsa Família data $(date -u +%Y-%m-%d)"
          git push
